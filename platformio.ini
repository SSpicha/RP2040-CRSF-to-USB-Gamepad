[env:yd_rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; Stable frequency for 1ms USB polling (low EMI and heat)
board_build.f_cpu = 133000000L

; Enable TinyUSB support
build_flags = 
    -DUSE_TINYUSB
    -O3
    -ffast-math

; Set USB polling interval to 1000 Hz (1 ms) for maximum performance
board_build.usb_hid.poll_interval = 1 

monitor_speed = 420000 

lib_deps = 
    adafruit/Adafruit TinyUSB Library @ ^3.3.3
    adafruit/Adafruit NeoPixel @ ^1.12.3
